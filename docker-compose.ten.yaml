version: "3.8"

services:
  polyclaw-ten:
    build:
      context: .
    container_name: polyclaw-ten
    restart: unless-stopped
    volumes:
      - /home/ubuntu/polyclaw-cipher-v3/data_ten:/app/data
      - /home/ubuntu/polyclaw-cipher-v3/config:/app/config:ro
    environment:
      - BOT_MODE=ten
      - HTTP_PORT=8083
      - TG_BOT_TOKEN=8823623175:AAEr9Rw_y4caPN8LUga-UtYY8izvBcL5vgo
      - TG_CHAT_ID=2051570522
      - TG_DISABLE_POLL=true
    ports:
      - "8083:8083"

networks:
  polyclaw-ten_default:
    driver: bridge
