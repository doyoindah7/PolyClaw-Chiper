services:
  polyclaw-dryrun:
    build:
      context: .
    container_name: polyclaw-dryrun
    restart: "no"
    volumes:
      - /home/ubuntu/polyclaw-cipher-v3/data_dryrun:/app/data
      - /home/ubuntu/polyclaw-cipher-v3/config/dry_run.yaml:/app/config/live.yaml:ro
    environment:
      - BOT_MODE=live
      - HTTP_PORT=8091
      - INITIAL_BANKROLL_USD=2.6
      - LIVE_FUNDER=0xf9f38a1dc12fc665222734cf73b1a8f5daf24e9a
      - POLYGON_RPC_URL=https://api-polygon-mainnet-full.n.dwellir.com/4be0e187-1528-40c5-9472-49538aeb26e6
      - TG_BOT_TOKEN=8461482229:AAGgT6PZu5x7ibA7HGTB0Z1fUtr1N5QD5fE
      - TG_CHAT_ID=2051570522
      - TG_DISABLE_POLL=true
      - TG_INSTANCE_LABEL=🧪DRYRUN
      - TG_ALERT_TRADES=1
    env_file:
      - live/.env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8091:8091"
