services:
  polyclaw-cipher:
    build: .
    container_name: polyclaw-cipher
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - BOT_MODE=paper
      - INITIAL_BANKROLL_USD=25.00
      - VERIFY_SSL=false
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    network_mode: bridge
