auto_tune:
  enabled: false
  v2_enabled: false
bot:
  loop_interval_sec: 3
  max_open_positions: 8
  mode: live
  scan_interval_sec: 30
execution:
  fee_rate_bps: 25
  live:
    exit_retry_delay_sec: 30
    fee_rate_bps: 25
  max_retries: 2
  retry_delay_sec: 1
  signature_type: 3
risk:
  initial_bankroll_usd: 10.0
  max_consecutive_losses_global: 7
  max_daily_drawdown_pct: 50.0
  max_trades_per_hour_global: 50
  per_strategy:
    momentum:
      max_capital_pct: 0.30
      max_consecutive_losses: 5
      max_trades_per_hour: 40
  sizer:
    cash_min_pct: 5
    max_open_positions: 4
    max_pct_per_trade: 0.17
    min_position_usd: 1.0
strategies:
  atomic_arb:
    enabled: false
  latency_arb:
    enabled: false
  momentum:
    allowed_categories:
    - crypto
    - sports_match
    - sports_total
    - sports_spread
    - economics
    - politics
    - entertainment
    - other
    cooldown_sec: 30
    enabled: true
    force_signal_mode: false
    lookback_long_sec: 180
    lookback_short_sec: 60
    max_entry_price: 0.95
    max_hold_sec: 300
    max_notional_pct: 0.15
    max_per_market_pct: 0.35
    max_positions: 6
    max_volatility: 0.99
    min_confidence: 0.2
    min_entry_price: 0.10
    min_momentum_long_pct: 0.002
    min_momentum_short_pct: 0.005
    min_position_usd: 1.0
    stop_loss_pct: 4.0
    take_profit_pct: 8.0
  resolution_snipe:
    enabled: false
tier:
  force_tier: 0
