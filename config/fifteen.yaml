# PolyClaw-Cipher v3.5.13 — $15 Micro Live Test
# Overlay di atas default.yaml + ten.yaml base
# Port 8084, data_fifteen/

bot:
  scan_interval_sec: 60
  loop_interval_sec: 1

tier:
  force_tier: 0

sizer:
  min_position_usd: 1.0        # Override Tier 1 $3 → $1 untuk $15
  max_pct_per_trade: 0.10       # 10% × $15 = $1.50 (micro-conservative)
  cash_min_pct: 0.30            # 30% cash buffer ($4.50)
  max_open_positions: 4

risk:
  initial_bankroll_usd: 15.0   # ← PENTING: override dari default 25.0
  max_consecutive_losses_global: 6
  max_daily_drawdown_pct: 40.0
  max_trades_per_hour_global: 30
  per_strategy:
    momentum:
      max_consecutive_losses: 4
      max_trades_per_hour: 20
      max_capital_pct: 0.40

strategies:
  latency_arb:
    enabled: false               # Disable — too complex for initial live
  atomic_arb:
    enabled: false               # Disable — leg risk in live
  resolution_snipe:
    enabled: false               # Disable — dead weight
  momentum:
    enabled: true
    max_positions: 4             # 4 concurrent max for $15
    min_entry_price: 0.10
    max_entry_price: 0.95
    min_position_usd: 1.0        # Minimum $1 per position
    max_per_market_pct: 0.25     # Per-market exposure cap
    take_profit_pct: 8.0
    stop_loss_pct: 7.6
    max_hold_sec: 60
    cooldown_sec: 45
    # v3.5.16: all categories enabled — sports_match WR=70% from 2300 trades
    allowed_categories: ["crypto", "sports_match", "sports_total", "sports_spread", "economics", "politics", "entertainment", "other"]
